version: "3.9"

services:
  portal_inovaverso_app:
    image: ghcr.io/joseojunior/portal_inovaverso:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      RUN_MIGRATIONS: "true"
      RUN_ADMIN_BOOTSTRAP: "${RUN_ADMIN_BOOTSTRAP:-false}"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador Inovaverso}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      NEXTAUTH_URL: https://inovaversotv.com.br
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AI_INGESTION_TOKEN: ${AI_INGESTION_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET}
    networks:
      - JunixNet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 0
        window: 60s
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        order: stop-first
        parallelism: 1
      resources:
        reservations:
          cpus: "0.25"
          memory: 512M
        limits:
          cpus: "1.00"
          memory: 1G
      labels:
        - traefik.enable=true
        - traefik.docker.network=JunixNet
        - traefik.http.routers.portal_inovaverso_app.rule=Host(`inovaversotv.com.br`)
        - traefik.http.routers.portal_inovaverso_app.entrypoints=websecure
        - traefik.http.routers.portal_inovaverso_app.tls.certresolver=letsencryptresolver
        - traefik.http.routers.portal_inovaverso_app.priority=1
        - traefik.http.routers.portal_inovaverso_app.service=portal_inovaverso_app
        - traefik.http.services.portal_inovaverso_app.loadbalancer.server.port=3000
        - traefik.http.services.portal_inovaverso_app.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.portal_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.portal_inovaverso_app.middlewares=portal_sslheader
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s

networks:
  JunixNet:
    external: true
    name: JunixNet
